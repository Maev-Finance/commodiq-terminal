<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommodIQ Terminal — Maev Finance</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#06090f;--panel:#0b1019;--card:#101622;--hover:#162038;--bdr:#1e2d48;--bdr2:#2d4a72;--txt:#edf2fa;--dim:#8a9bbf;--mut:#5a6d8a;--grn:#00e6b4;--red:#ff4d6a;--amb:#ffb020;--blu:#4da6ff;--cyn:#00deff;--mag:#c97dff;--news:#08101a}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'IBM Plex Mono','Courier New',monospace;font-size:12px;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--panel)}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
a{color:var(--blu);text-decoration:none}
button{font-family:inherit;cursor:pointer;outline:none;border:1px solid var(--bdr);background:transparent;color:var(--dim);border-radius:3px;padding:4px 11px;font-size:11px;font-weight:600;letter-spacing:.3px;transition:all .15s}
button:hover{border-color:var(--bdr2);color:var(--txt)}
button.on{background:rgba(0,230,180,.12);color:var(--grn);border-color:rgba(0,230,180,.4)}
.shell{display:flex;flex-direction:column;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:11px 22px;border-bottom:1px solid var(--bdr);background:var(--panel)}
.logo{font-size:18px;font-weight:800;letter-spacing:4px;color:var(--grn)}.logo b{color:var(--amb)}
.hdr-firm{font-size:9.5px;color:var(--mut);letter-spacing:2px;font-weight:500}
.hdr-r{display:flex;gap:14px;align-items:center;font-size:10.5px;color:var(--dim)}
.live{color:var(--grn);font-size:10px}.clock{color:var(--txt);font-variant-numeric:tabular-nums;font-size:11px;font-weight:500}
/* Refresh button states */
.rbtn{border-radius:3px;padding:5px 14px;font-size:10.5px;font-weight:600;cursor:pointer;transition:all .2s;position:relative;letter-spacing:.3px}
.rbtn.avail{background:rgba(0,230,180,.15);color:#00e6b4;border:1px solid rgba(0,230,180,.5);animation:pulse 2s ease infinite}
.rbtn.stale{background:transparent;color:var(--mut);border:1px solid var(--bdr);cursor:default}
.rbtn .badge{position:absolute;top:-5px;right:-5px;background:#ff4d6a;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;line-height:1.3}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,230,180,.3)}50%{box-shadow:0 0 8px 2px rgba(0,230,180,.15)}}
/* Report panel */
.rpanel{position:absolute;top:100%;right:0;margin-top:6px;background:var(--card);border:1px solid var(--bdr);border-radius:4px;padding:12px 16px;width:400px;z-index:100;box-shadow:0 12px 32px rgba(0,0,0,.6)}
.rpanel-title{font-size:10px;color:var(--dim);letter-spacing:1.5px;margin-bottom:10px;font-weight:700}
.ritem{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(30,45,72,.4);font-size:11px}
.ritem:last-child{border-bottom:none}
.ritem .rlabel{color:var(--txt)}.ritem .rstatus{font-weight:600;font-size:10px;letter-spacing:.3px}
.ritem a{color:var(--blu);font-size:10px;margin-left:8px}
.rnew{color:var(--grn)}.rold{color:var(--mut)}
.rnext{font-size:10px;color:var(--mut);margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)}
/* Ticker */
.ticker{background:var(--news);border-bottom:1px solid var(--bdr);overflow:hidden;height:30px;position:relative}
.ticker-track{display:flex;position:absolute;top:0;height:30px;align-items:center;white-space:nowrap;animation:scroll 140s linear infinite}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker a{display:inline-flex;align-items:center;gap:9px;padding:0 22px;height:30px;font-size:11px;border-right:1px solid rgba(30,45,72,.4);text-decoration:none}
.ticker .td{color:var(--amb);font-weight:700;font-size:9.5px}.ticker .ts{color:var(--mut);font-size:9.5px}.ticker .tt{color:var(--txt);font-weight:500}.ticker .tl{color:var(--blu);font-size:9.5px}
/* KPI */
.kpi-strip{display:flex;gap:6px;padding:10px 22px 6px;overflow-x:auto}
.kpi{background:var(--card);border:1px solid var(--bdr);border-radius:3px;padding:9px 13px 22px;cursor:pointer;min-width:145px;position:relative;overflow:hidden;transition:all .15s;flex:0 0 auto}
.kpi:hover{border-color:var(--bdr2);background:var(--hover)}
.kpi.sel{background:var(--hover)}.kpi .bar{position:absolute;top:0;left:0;right:0;height:2px}
.kpi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.kpi-sym{font-size:11px;font-weight:700;letter-spacing:1.5px}.kpi-unit{font-size:9px;color:var(--mut)}
.kpi-price{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.5px;line-height:1.1;margin-bottom:1px}
.kpi-chg{display:flex;gap:7px;margin-top:4px;font-size:10px}.kpi-sep{color:var(--mut)}
.kpi-trend{font-size:13px;margin-left:auto}
/* Layout */
.controls{display:flex;justify-content:space-between;align-items:center;padding:5px 22px 6px;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--bdr)}
.ctrl-l{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.btn-grp{display:flex;gap:3px}
.keys-hint{font-size:9px;color:var(--mut);letter-spacing:.3px}
.main{display:flex;gap:10px;padding:10px 22px 10px}
.chart-col{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
.chart-title{padding:0 3px;font-size:12.5px;font-weight:600;letter-spacing:.3px}
.chart-box{background:var(--card);border:1px solid var(--bdr);border-radius:3px;position:relative;overflow:hidden;height:360px}
.chart-box canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
.mini-chart{overflow:hidden;position:relative;height:148px}.mini-chart canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
.side{width:210px;display:flex;flex-direction:column;gap:8px}
.detail{background:var(--card);border:1px solid var(--bdr);border-radius:3px;padding:12px 14px;font-size:11px;line-height:1.8}
.det-sym{font-size:11.5px;font-weight:700;margin-bottom:4px;letter-spacing:1.5px}
.det-src{font-size:8.5px;color:var(--mut);margin-bottom:8px;letter-spacing:.5px}
.det-row{display:flex;justify-content:space-between;padding:1px 0}.det-lbl{color:var(--dim)}.det-val{font-variant-numeric:tabular-nums;font-weight:500}
.tbl-wrap{padding:0 22px 10px}
.tbl-box{background:var(--card);border:1px solid var(--bdr);border-radius:3px;padding:12px 14px;overflow-x:auto}
.tbl-title{font-size:10.5px;color:var(--dim);margin-bottom:8px;letter-spacing:2px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{padding:5px 7px;text-align:right;color:var(--dim);font-weight:600;font-size:9.5px;border-bottom:1px solid var(--bdr);letter-spacing:.5px}
th:first-child{text-align:left}
td{padding:5px 7px;text-align:right;font-variant-numeric:tabular-nums;border-bottom:1px solid rgba(30,45,72,.15);font-size:11px}
td:first-child{text-align:left;font-weight:700}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(22,32,56,.4)}
.footer{display:flex;justify-content:space-between;align-items:center;padding:6px 22px;border-top:1px solid var(--bdr);background:var(--panel);font-size:9.5px;color:var(--mut)}
.matrix{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mini-hdr{font-size:10px;font-weight:700;letter-spacing:1.5px;padding:5px 9px;background:var(--card);display:flex;justify-content:space-between;align-items:center;border-top:2px solid}
.up{color:var(--grn)}.dn{color:var(--red)}.flat{color:var(--dim)}
/* Help overlay */
.help-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(4,8,16,.95);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.help-box{background:var(--panel);border:1px solid var(--bdr2);border-radius:4px;width:100%;max-width:960px;max-height:calc(100vh - 40px);display:flex;flex-direction:column}
.help-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.help-title{font-size:13px;font-weight:800;letter-spacing:2px;color:var(--grn)}
.help-sub{font-size:9px;color:var(--mut);letter-spacing:1.5px;margin-left:14px}
.help-close{font-size:11px;font-weight:700;color:var(--dim);cursor:pointer;background:transparent;border:1px solid var(--bdr);border-radius:3px;padding:4px 13px;font-family:inherit;transition:all .1s}
.help-close:hover{color:var(--txt);border-color:var(--bdr2);background:var(--hover)}
.help-body{padding:24px 26px;overflow-y:auto;flex:1}
.help-section{margin-bottom:30px}
.help-section:last-child{margin-bottom:8px}
.help-stitle{font-size:9px;font-weight:700;letter-spacing:3px;color:var(--amb);margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid var(--bdr)}
.help-grid{width:100%;border-collapse:collapse;margin-bottom:8px}
.help-grid th{padding:5px 10px;text-align:left;color:var(--dim);font-size:9px;font-weight:600;letter-spacing:.5px;border-bottom:1px solid var(--bdr)}
.help-grid td{padding:6px 10px;font-size:11px;border-bottom:1px solid rgba(30,45,72,.2);vertical-align:top;line-height:1.6}
.help-grid tr:last-child td{border-bottom:none}
.help-note{font-size:10.5px;color:var(--dim);line-height:1.85;margin-top:10px}
.help-sub-label{font-size:9px;color:var(--mut);letter-spacing:1.2px;margin:16px 0 8px;font-weight:600}
.help-cols{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.help-kv{display:flex;gap:9px;flex-wrap:wrap}
.help-key{background:var(--card);border:1px solid var(--bdr);border-radius:3px;padding:6px 14px;display:flex;gap:14px;align-items:center;min-width:180px}
.help-key .hk{color:var(--grn);font-weight:700;font-size:11px;min-width:44px}
.help-key .hv{color:var(--dim);font-size:10px}
.help-warn{color:#ff4d6a;font-size:10px;font-weight:600}
.help-hbtn{font-size:12px;font-weight:700;padding:3px 10px;cursor:pointer;transition:all .1s}
/* Market Intel Panel */
.intel-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:498;background:rgba(4,8,16,.55);cursor:default}
.intel-panel{position:fixed;left:50%;transform:translateX(-50%);top:175px;width:570px;max-width:calc(100vw - 24px);max-height:calc(100vh - 195px);background:var(--card);border:1px solid var(--bdr2);border-radius:4px;box-shadow:0 18px 52px rgba(0,0,0,.75);display:flex;flex-direction:column;overflow:hidden;z-index:499}
.intel-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.intel-sym{font-size:13px;font-weight:800;letter-spacing:2px}
.intel-nm{font-size:8.5px;color:var(--mut);letter-spacing:1.5px;margin-left:10px;font-weight:500}
.intel-close{font-size:10px;font-weight:700;color:var(--dim);cursor:pointer;background:transparent;border:1px solid var(--bdr);border-radius:3px;padding:3px 11px;font-family:inherit;transition:all .1s;letter-spacing:.3px}
.intel-close:hover{color:var(--txt);border-color:var(--bdr2)}
.intel-body{padding:13px 16px 14px;overflow-y:auto}
.intel-label{font-size:9px;color:var(--mut);letter-spacing:1.5px;font-weight:600;margin-bottom:10px}
.intel-bullet{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(30,45,72,.28);font-size:11px;line-height:1.6}
.intel-bullet:last-child{border-bottom:none}
.intel-icon{font-size:11px;font-weight:700;min-width:16px;margin-top:2px}
.intel-text{color:var(--txt);flex:1}
.intel-meta{font-size:9px;color:var(--mut);letter-spacing:.7px;margin-top:10px;padding-top:8px;border-top:1px solid var(--bdr);line-height:1.6}
.kpi-info{position:absolute;bottom:5px;right:7px;font-size:8.5px;color:var(--mut);background:transparent;border:1px solid var(--bdr);border-radius:2px;padding:1px 6px;cursor:pointer;transition:all .12s;font-family:inherit;font-weight:600;letter-spacing:.4px;line-height:1.5}
.kpi-info:hover{color:var(--txt);border-color:var(--bdr2);background:rgba(30,45,72,.3)}
.kpi-info.iac{color:var(--amb);border-color:rgba(255,176,32,.5);background:rgba(255,176,32,.1)}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════

var NEWS=[
{t:"65CL Trim Drops to $230.65/cwt \u2014 Down 10.7% WoW; 28 Trades, 612K lbs Apr 3",d:"Apr 3",s:"USDA AMS",u:"https://www.ams.usda.gov/mnreports/ams_2462.pdf"},

{t:"50CL Weekly Avg $175.75/cwt on 76 Trades, 1.9M lbs \u2014 Broad Demand Week of Apr 3",d:"Apr 3",s:"USDA AMS",u:"https://www.ams.usda.gov/mnreports/ams_2462.pdf"},

{t:"Russet Norkotah Firms to $10.00/cwt; Storage Premiums Building into Spring",d:"Apr 1",s:"USDA AMS",u:"https://www.ams.usda.gov/mnreports/fvdidnop.pdf"},

{t:"Green Beans $90-92/bu FL Handpicked at NY Terminal",d:"Mar 26",s:"USDA AMS",u:"https://www.ams.usda.gov/mnreports/nx_fv020.pdf"},
{t:"USDA ERS: Beef & Veal Prices to Rise 10.1% in 2026",d:"Mar 25",s:"USDA ERS",u:"https://www.ers.usda.gov/topics/animal-products/cattle-beef/market-outlook"},
{t:"Fresh Vegetable Prices +2.8% MoM, +5.4% YoY in Feb",d:"Mar 25",s:"USDA ERS",u:"https://www.ers.usda.gov/data-products/food-price-outlook/summary-findings"},
{t:"USDA: All Food +3.6% in 2026; Beef +10.1%",d:"Mar 25",s:"USDA ERS",u:"https://www.ers.usda.gov/data-products/food-price-outlook/summary-findings"},
];

// ═══ 9 COMMODITIES (4 beef trims + 2 chicken + 1 offal gizzard + potato + green bean) ═══
var COMS=[
{k:"BT50",nm:"Beef Trim 50CL",un:"$/cwt",cl:"#ff4d6a",sy:"BT50",sr:"USDA AMS ams_2462",hk:"BT50",rpt:"daily_cattle"},
{k:"BT65",nm:"Beef Trim 65CL",un:"$/cwt",cl:"#ff6b81",sy:"BT65",sr:"USDA AMS ams_2462",hk:"BT65",rpt:"weekly_trim"},
{k:"BT81",nm:"Beef Trim 81CL",un:"$/cwt",cl:"#e84363",sy:"BT81",sr:"USDA AMS ams_2462",hk:"BT81",rpt:"weekly_trim"},

{k:"GB",nm:"Snap Green Beans",un:"$/bu",cl:"#00deff",sy:"GNSB",sr:"USDA AMS NX_FV020",hk:"GB",rpt:"daily_veggie"},
];
var TRS={"1M":30,"3M":90,"6M":180,"1Y":365,"ALL":730};

// ═══ USDA REPORT SCHEDULE (all times ET) ═══
var REPORTS={
  daily_cattle:{name:"Daily Cattle & Beef Summary",freq:"Daily (M-F)",hour:15,days:[1,2,3,4,5],url:"https://www.ams.usda.gov/mnreports/lsddcbs.pdf"},
  weekly_trim:{name:"Wkly Boneless Processing Beef & Trimmings",freq:"Weekly (Fri)",hour:15,days:[5],url:"https://www.ams.usda.gov/mnreports/ams_2462.pdf"},
  weekly_chicken:{name:"Weekly National Chicken Report",freq:"Weekly (Fri)",hour:14,days:[5],url:"https://www.ams.usda.gov/mnreports/ams_3646.pdf"},
  weekly_poultry:{name:"Misc Poultry Report (Liver/Gizzard)",freq:"Weekly (Fri)",hour:14,days:[5],url:"https://www.ams.usda.gov/mnreports/ams_3645.pdf"},
  daily_potato:{name:"National Potato & Onion Report",freq:"Daily (M-F)",hour:17,days:[1,2,3,4,5],url:"https://www.ams.usda.gov/mnreports/fvdidnop.pdf"},
  daily_veggie:{name:"Terminal Market Vegetable Prices",freq:"Daily (M-F)",hour:12,days:[1,2,3,4,5],url:"https://www.ams.usda.gov/mnreports/nx_fv020.pdf"},
};

function getReportStatus(){
  var now=new Date();
  var etOffset=(now.getUTCMonth()>=3&&now.getUTCMonth()<=10)?-4:-5;// EDT Apr-Oct, EST Nov-Mar
  var utcH=now.getUTCHours();
  var etH=utcH+etOffset;var dow=now.getUTCDay();// 0=Sun
  if(etH<0){etH+=24;dow=(dow+6)%7;}
  var lastCheck=state.lastCheck||0;
  var results=[];var newCount=0;
  var seen={};// dedupe reports
  COMS.forEach(function(c){
    var rk=c.rpt;if(seen[rk])return;seen[rk]=true;
    var rpt=REPORTS[rk];if(!rpt)return;
    var isReportDay=rpt.days.indexOf(dow)>=0;
    var pastTime=etH>=rpt.hour;
    var available=isReportDay&&pastTime;
    var isNew=available&&(now.getTime()-lastCheck>3600000);// new if >1hr since last check
    if(isNew)newCount++;
    results.push({key:rk,name:rpt.name,freq:rpt.freq,url:rpt.url,available:available,isNew:isNew});
  });
  // Find next report time
  var nextStr="";
  var dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var earliest=null;
  Object.keys(REPORTS).forEach(function(rk){
    var rpt=REPORTS[rk];
    for(var d=0;d<7;d++){
      var checkDay=(dow+d)%7;
      if(rpt.days.indexOf(checkDay)>=0){
        var h=rpt.hour;
        if(d===0&&etH>=h)continue;// already past today
        if(!earliest||d<earliest.d||(d===earliest.d&&h<earliest.h))earliest={d:d,h:h,day:dayNames[checkDay]};
        break;
      }
    }
  });
  if(earliest)nextStr=earliest.day+" "+earliest.h+":00 ET";
  return{reports:results,newCount:newCount,next:nextStr};
}

var state={sel:0,tr:"6M",view:"SINGLE",fc:true,lbMode:false,data:{},metrics:{},forecasts:{},lastCheck:0,showPanel:false,showHelp:false,intel:null};

// ═══ ACTUAL USDA PRICE DATA — USDA AMS LM_XB460 (beef) & AMS_3649 (chicken), Jan 2020–Apr 2026 ═══

// Chicken: USDA AMS ams_3649 Monthly National Chicken Report PDFs — domestic fresh FOB wtd avg, ¢/lb

// Green Beans: USDA AMS NX_FV020 NY Terminal Market FL Handpicked, $/bu
var HIST={
  // ── BT50: LM_XB460 Chemical Lean Fresh 50%, $/cwt — end-of-month weekly Friday
  BT50:[
    {date:"2020-01-31",price:66.76,vol:null},
    {date:"2020-02-28",price:57.33,vol:null},
    {date:"2020-03-27",price:49.96,vol:null},
    {date:"2020-04-17",price:77.64,vol:null},
    {date:"2020-05-29",price:103.16,vol:null},
    {date:"2020-06-26",price:67.47,vol:null},
    {date:"2020-07-31",price:60.13,vol:null},
    {date:"2020-08-28",price:45.04,vol:null},
    {date:"2020-09-25",price:48.43,vol:null},

function filterDays(data,days){

function calcM(data){
  if(!data||data.length<1)return null;
  var last=data[data.length-1];if(!last)return null;
  var latest=last.price,lastDate=new Date(last.date);
  function closestBefore(daysAgo){
    var target=new Date(lastDate);target.setDate(target.getDate()-daysAgo);
    var best=null,bestDist=Infinity;
    for(var i=0;i<data.length-1;i++){var dist=Math.abs(new Date(data[i].date).getTime()-target.getTime());if(dist<bestDist){bestDist=dist;best=data[i].price;}}

  }
  function maWindow(days){
    var cut=new Date(lastDate);cut.setDate(cut.getDate()-days);
    var pts=[];for(var i=0;i<data.length;i++){if(new Date(data[i].date)>=cut)pts.push(data[i].price);}
    return pts.length?(pts.reduce(function(a,b){return a+b;})/pts.length):null;
  }
  var prev=data.length>=2?data[data.length-2].price:null;
  var wk=data.length>=2?closestBefore(7):null;
  var mo=data.length>=2?closestBefore(30):null;
  var yr=data.length>=2?closestBefore(365):null;
  var a7=maWindow(7)||latest,a30=maWindow(30)||latest,a90=maWindow(90)||latest;
  var h52=-1e9,l52=1e9,cut52=new Date(lastDate);cut52.setDate(cut52.getDate()-365);
  for(var i=0;i<data.length;i++){if(new Date(data[i].date)>=cut52){if(data[i].price>h52)h52=data[i].price;if(data[i].price<l52)l52=data[i].price;}}
  if(h52===-1e9)h52=latest;if(l52===1e9)l52=latest;
  var rets=[];for(var i=1;i<data.length;i++){if(data[i].price&&data[i-1].price)rets.push(Math.log(data[i].price/data[i-1].price));}
  var volAnn=0;
  if(rets.length>=1){
    var mr=0;for(var i=0;i<rets.length;i++)mr+=rets[i];mr/=rets.length;
    var va=0;for(var i=0;i<rets.length;i++)va+=(rets[i]-mr)*(rets[i]-mr);va/=Math.max(1,rets.length);
    var totalDays=data.length>1?(new Date(data[data.length-1].date)-new Date(data[0].date))/86400000:365;
    var ppy=data.length>1?(data.length-1)/(totalDays/365):52;
    volAnn=Math.sqrt(va*ppy)*100;
  }
  var daily=prev!=null?((latest-prev)/prev)*100:null;
  var wow=wk!=null?((latest-wk)/wk)*100:null;
  var mom=mo!=null?((latest-mo)/mo)*100:null;
  var yoy=yr!=null?((latest-yr)/yr)*100:null;
  var tr="\u2192";
  if(wow!=null){if(wow>0.8)tr="\u2191";else if(wow<-0.8)tr="\u2193";}

}
function doFc(data){

}

function drawMini(cv,series,color,fcData){
  var ctx=cv.getContext("2d"),dpr=window.devicePixelRatio||1,w=cv.width/dpr,h=cv.height/dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,w,h);if(!series||series.length<2)return;
  var pr=series.map(function(d){return d.price;});
  var fc4=fcData&&fcData.length?fcData.slice(0,4):null;
  var mn=Math.min.apply(null,pr),mx=Math.max.apply(null,pr);
  if(fc4){for(var i=0;i<fc4.length;i++){mn=Math.min(mn,fc4[i].lower);mx=Math.max(mx,fc4[i].upper);}}
  var rng=mx-mn||1;mn-=rng*0.05;mx+=rng*0.05;rng=mx-mn;
  var p=4,cw=w-2*p,ch=h-2*p;
  var fs=pr.length,total=fs+(fc4?fc4.length:0);
  function xP(i){return p+i/Math.max(1,total-1)*cw;}
  function yP(v){return p+(1-(v-mn)/rng)*ch;}
  // Gradient fill — historical only
  var grad=ctx.createLinearGradient(0,p,0,h-p);grad.addColorStop(0,color+"40");grad.addColorStop(1,color+"05");
  ctx.fillStyle=grad;ctx.beginPath();ctx.moveTo(xP(0),yP(pr[0]));
  for(var i=1;i<pr.length;i++)ctx.lineTo(xP(i),yP(pr[i]));
  ctx.lineTo(xP(fs-1),h-p);ctx.lineTo(xP(0),h-p);ctx.closePath();ctx.fill();
  // Historical price line
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(xP(0),yP(pr[0]));
  for(var i=1;i<pr.length;i++)ctx.lineTo(xP(i),yP(pr[i]));ctx.stroke();
  // Forecast — cone + dotted midpoint line (4W only, unified coordinate system)
  if(fc4){
    ctx.fillStyle="rgba(0,222,255,0.18)";ctx.beginPath();
    ctx.moveTo(xP(fs-1),yP(pr[pr.length-1]));
    for(var i=0;i<fc4.length;i++)ctx.lineTo(xP(fs+i),yP(fc4[i].upper));
    for(var i=fc4.length-1;i>=0;i--)ctx.lineTo(xP(fs+i),yP(fc4[i].lower));
    ctx.closePath();ctx.fill();
    ctx.strokeStyle="#00deff";ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();
    ctx.moveTo(xP(fs-1),yP(pr[pr.length-1]));
    for(var i=0;i<fc4.length;i++)ctx.lineTo(xP(fs+i),yP(fc4[i].price));
    ctx.stroke();ctx.setLineDash([]);
    var ep=fc4[fc4.length-1];
    ctx.fillStyle="#00deff";ctx.beginPath();
    ctx.arc(xP(total-1),yP(ep.price),2.5,0,Math.PI*2);ctx.fill();
  }
}

function drawOverlay(canvas,seriesArr,colors,labels,opts){
  opts=opts||{};var ctx=canvas.getContext("2d"),dpr=window.devicePixelRatio||1,w=canvas.width/dpr,h=canvas.height/dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,w,h);
  if(!seriesArr||!seriesArr.length)return;
  var pad={t:18,r:96,b:28,l:62},cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  var normArr=seriesArr.map(function(ser){
    if(!ser||ser.length<2)return[];
    var base=ser[0].price||1;
    return ser.map(function(d){return{date:d.date,pct:((d.price-base)/base)*100};});
  });
  var mn=0,mx=0;
  normArr.forEach(function(norm){norm.forEach(function(d){if(d.pct<mn)mn=d.pct;if(d.pct>mx)mx=d.pct;});});
  var range=(mx-mn)||1;mn-=range*0.08;mx+=range*0.08;range=mx-mn;
  var total=seriesArr[0]?seriesArr[0].length:1;
  function xP(i){return pad.l+(i/Math.max(1,total-1))*cw;}
  function yP(v){return pad.t+(1-(v-mn)/range)*ch;}
  ctx.strokeStyle="#1e2d48";ctx.lineWidth=0.6;
  for(var g=0;g<5;g++){var gv=mn+(range/4)*g,gy=yP(gv);ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(w-pad.r,gy);ctx.stroke();ctx.fillStyle="#6a7d9e";ctx.font="11px 'IBM Plex Mono',monospace";ctx.textAlign="right";ctx.fillText((gv>=0?"+":"")+gv.toFixed(1)+"%",pad.l-5,gy+3);}
  if(mn<0&&mx>0){var zy=yP(0);ctx.strokeStyle="#3a4f70";ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(pad.l,zy);ctx.lineTo(w-pad.r,zy);ctx.stroke();ctx.setLineDash([]);}
  ctx.fillStyle="#6a7d9e";ctx.font="11px 'IBM Plex Mono',monospace";ctx.textAlign="center";
  var step=Math.max(1,Math.floor(total/6));var bs=seriesArr[0]||[];
  for(var i=0;i<bs.length;i+=step){var dl=new Date(bs[i].date);ctx.fillText(dl.toLocaleDateString("en-US",{month:"short",day:"numeric"}),xP(i),h-pad.b+15);}
  normArr.forEach(function(norm,ci){
    if(!norm||norm.length<2)return;
    var col=colors[ci];
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.globalAlpha=0.85;
    ctx.beginPath();ctx.moveTo(xP(0),yP(norm[0].pct));
    for(var i=1;i<norm.length;i++)ctx.lineTo(xP(i),yP(norm[i].pct));
    ctx.stroke();
    var lv=norm[norm.length-1].pct;
    ctx.globalAlpha=1;ctx.fillStyle=col;ctx.font="bold 10px 'IBM Plex Mono',monospace";ctx.textAlign="left";
    ctx.fillText(labels[ci],xP(norm.length-1)+5,yP(lv)+3);
  });
  ctx.globalAlpha=1;
  if(opts.hoverX!=null){var hIdx=Math.round((opts.hoverX-pad.l)/cw*(total-1));if(hIdx>=0&&hIdx<total){ctx.strokeStyle="#28406a";ctx.lineWidth=0.5;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(xP(hIdx),pad.t);ctx.lineTo(xP(hIdx),h-pad.b);ctx.stroke();ctx.setLineDash([]);normArr.forEach(function(norm,ci){if(!norm||hIdx>=norm.length)return;ctx.fillStyle=colors[ci];ctx.beginPath();ctx.arc(xP(hIdx),yP(norm[hIdx].pct),3,0,Math.PI*2);ctx.fill();});}}
}

    // ── SECTION 2: Metrics ──
    html+='<div class="help-section">';
    html+='<div class="help-stitle">02 \u2014 METRICS REFERENCE</div>';
    html+='<div class="help-cols">';
    html+='<div>';
    html+='<table class="help-grid"><thead><tr><th>METRIC</th><th>WHAT IT MEANS</th></tr></thead><tbody>';
    html+='<tr><td style="color:var(--txt);font-weight:700">LAST</td><td>Most recently reported market price</td></tr>';
    html+='<tr><td style="color:var(--txt);font-weight:700">D%</td><td>Change vs. the prior day\u2019s price</td></tr>';
    html+='<tr><td style="color:var(--txt);font-weight:700">W%</td><td>Change vs. 7 days ago. <b>Primary trend signal.</b> Drives the TREND arrow.</td></tr>';
    html+='<tr><td style="color:var(--txt);font-weight:700">M%</td><td>Change vs. 30 days ago. Indicates medium-term momentum.</td></tr>';
    html+='<tr><td style="color:var(--txt);font-weight:700">Y%</td><td>Change vs. 365 days ago. Year-over-year context for cost benchmarking.</td></tr>';
    html+='<tr><td style="color:var(--amb);font-weight:700">VOL</td><td>Annualized price volatility (%). How unpredictable this commodity is. &lt;5% = stable \u00b7 5\u201315% = moderate risk \u00b7 &gt;15% = high risk, hedge carefully.</td></tr>';
    html+='<tr><td style="color:var(--txt);font-weight:700">TREND</td><td style="font-size:11px">\u2191 Rising (W% &gt; +0.8%) \u00b7 \u2192 Flat \u00b7 \u2193 Falling (W% &lt; -0.8%)</td></tr>';
    html+='</tbody></table>';
    html+='</div>';
    html+='<div>';
    html+='<table class="help-grid"><thead><tr><th>METRIC</th><th>WHAT IT MEANS &amp; HOW TO USE IT</th></tr></thead><tbody>';
    html+='<tr><td style="color:var(--dim);font-weight:700">MA-7</td><td>7-day moving average. Short-term noise-smoothed price. Compare to LAST to see if today is above/below the recent average.</td></tr>';
    html+='<tr><td style="color:var(--dim);font-weight:700">MA-30</td><td>30-day moving average. Medium-term baseline. <b>LAST &gt; MA-30</b> = price is trending up. Useful as a contract pricing reference.</td></tr>';
    html+='<tr><td style="color:var(--dim);font-weight:700">MA-90</td><td>90-day moving average. Long-term trend floor/ceiling. If LAST is far above MA-90, market may be stretched. Consider forward contracts.</td></tr>';
    html+='<tr><td style="color:var(--grn);font-weight:700">52W H</td><td>Highest price in the last 52 weeks. Resistance level \u2014 if LAST approaches this, market is near its top.</td></tr>';
    html+='<tr><td style="color:var(--red);font-weight:700">52W L</td><td>Lowest price in the last 52 weeks. Support level \u2014 if LAST approaches this, may be a buying opportunity.</td></tr>';
    html+='</tbody></table>';
    html+='<div class="help-note">\u25b8 <b>Procurement signal:</b> When LAST &gt; MA-30 &gt; MA-90 and Y% is significantly positive, costs are accelerating. Consider locking in pricing or increasing safety stock.</div>';
    html+='</div>';
    html+='</div>';
    html+='</div>';

    // ── SECTION 3: Forecast ──
    html+='<div class="help-section">';
    html+='<div class="help-stitle">03 \u2014 THE 12-WEEK FORECAST (FC)</div>';
    html+='<div class="help-cols">';
    html+='<div class="help-note" style="font-size:10px">';
    html+='The terminal uses <b>Holt-Winters double exponential smoothing</b> \u2014 an algorithm that separately tracks the <i>price level</i> and the <i>direction of trend</i>, then projects both forward 12 weeks.<br><br>';
    html+='<span style="color:var(--cyn);font-weight:700">Dotted line</span> \u2014 forecast midpoint. The single most likely price at each future week.<br><br>';
    html+='<span style="color:var(--cyn);font-weight:700">Shaded cone</span> \u2014 95% confidence interval. Under normal market conditions, prices should land within this band approximately 95% of the time.<br><br>';
    html+='<span style="color:var(--dim)">The cone widens over time</span> because uncertainty compounds with each additional week projected.<br><br>';
    html+='<b>+4W / +8W / +12W</b> values in the stats panel are the forecast midpoint prices at those future dates.';
    html+='</div>';
    html+='<div class="help-note" style="font-size:10px">';
    html+='<b>How to use it in procurement:</b><br><br>';
    html+='If +12W forecast is <span style="color:var(--grn)">significantly higher</span> than today\u2019s price and the cone is narrow (low volatility), this is a signal to <b>lock in current pricing</b> via forward contracts or purchase orders.<br><br>';
    html+='If the cone is very wide, volatility is high and the forecast is less reliable \u2014 use wider pricing buffers in budgets.<br><br>';
    html+='If +12W is <span style="color:var(--red)">below today\u2019s price</span>, the trend suggests waiting may yield better pricing \u2014 but weigh this against supply availability risk.<br><br>';
    html+='<span class="help-warn">\u26a0 LIMITATION: This forecast is mathematical extrapolation only. It cannot predict supply shocks, disease outbreaks (HPAI), drought, trade policy changes, or other exogenous events. Use for directional guidance, not precision planning.</span>';
    html+='</div>';
    html+='</div>';
    html+='</div>';

    // ── SECTION 4: Views ──
    html+='<div class="help-section">';
    html+='<div class="help-stitle">04 \u2014 VIEWS &amp; NAVIGATION</div>';
    html+='<div class="help-cols">';
    html+='<div>';
    html+='<div style="color:var(--grn);font-weight:700;font-size:10px;margin-bottom:5px">SINGLE VIEW</div>';
    html+='<div class="help-note">Deep-dive on one commodity. Full price history chart with hover crosshair and a complete stats panel on the right showing all metrics plus forecast values. <b>Select a commodity</b> using the KPI cards at the top, or ↑↓ arrow keys.</div>';
    html+='<div style="color:var(--cyn);font-weight:700;font-size:10px;margin:14px 0 5px">OVERLAY VIEW</div>';
    html+='<div class="help-note">All 9 commodities on one chart, normalized to <b>% change from the start of the selected time period</b>. Every line starts at 0% on the left edge. Lines above zero are up from period start; below zero are down.<br><br>Use OVERLAY to answer: <i>"Which commodity is rising fastest this quarter?"</i> or <i>"Is chicken tracking with beef this year?"</i> Switch time ranges (1M/3M/6M etc.) to change the comparison baseline.<br><br>The right panel shows all 9 sorted by WoW % change \u2014 a quick leaderboard.</div>';
    html+='</div>';
    html+='<div>';
    html+='<div style="color:var(--mag);font-weight:700;font-size:10px;margin-bottom:5px">MATRIX VIEW</div>';
    html+='<div class="help-note">3\u00d73 grid showing all 9 commodities as mini sparkline charts simultaneously. Best for a quick visual scan of the full market. Click any cell to jump to that commodity in SINGLE view.</div>';
    html+='<div style="color:var(--dim);font-weight:700;font-size:10px;margin:14px 0 5px">TIME RANGES</div>';
    html+='<div class="help-note"><b>1M</b> = last 30 days \u00b7 <b>3M</b> = 90 days \u00b7 <b>6M</b> = 180 days \u00b7 <b>1Y</b> = 365 days \u00b7 <b>ALL</b> = full 2-year history. In OVERLAY, the % change baseline resets from the start of whichever range you select. Use <b>1M</b> to spot short-term moves; use <b>1Y</b> or <b>ALL</b> for budget season benchmarking.</div>';
    html+='<div style="color:var(--amb);font-weight:700;font-size:10px;margin:14px 0 5px">KPI CARDS (top strip)</div>';
    html+='<div class="help-note">The 9 cards across the top always show the latest price and key deltas regardless of which view you\u2019re in. The color bar highlights the currently selected commodity in SINGLE view. Cards are clickable.</div>';
    html+='</div>';
    html+='</div>';
    html+='</div>';

    // ── SECTION 5: Data & Reports ──
    html+='<div class="help-section">';
    html+='<div class="help-stitle">05 \u2014 DATA SOURCES &amp; USDA REPORT SCHEDULE</div>';
    html+='<div class="help-cols">';
    html+='<div>';
    html+='<table class="help-grid"><thead><tr><th>SOURCE</th><th>WHAT IT PUBLISHES</th></tr></thead><tbody>';
    html+='<tr><td style="font-weight:700;color:var(--txt)">USDA AMS</td><td>Agricultural Marketing Service. Publishes daily and weekly livestock, beef trim, poultry, and produce market price reports. <b>Primary data source for all 9 commodities.</b></td></tr>';
    html+='<tr><td style="font-weight:700;color:var(--txt)">USDA ERS</td><td>Economic Research Service. Monthly food price outlook and annual CPI forecasts (e.g., "Beef +10.1% in 2026").</td></tr>';
    html+='<tr><td style="font-weight:700;color:var(--txt)">NASS</td><td>National Agricultural Statistics Service. Cattle inventory counts, crop production surveys. Sets long-term context for supply fundamentals.</td></tr>';
    html+='</tbody></table>';
    html+='<div class="help-sub-label" style="margin-top:14px">REPORT STATUS INDICATORS</div>';
    html+='<div class="help-note">';
    html+='<span style="color:var(--grn)">&#9679; NEW</span> \u2014 Report released today; prices may have changed since last check<br>';
    html+='<span style="color:var(--dim)">&#9675; SEEN</span> \u2014 You clicked \u2197 View PDF within the last hour<br>';
    html+='<span style="color:var(--mut)">\u2014 PENDING</span> \u2014 Scheduled for today but not yet released<br><br>';
    html+='Click \u2197 View PDF in the report badge to read the actual USDA PDF and mark the report as seen.';
    html+='</div>';
    html+='</div>';
    html+='<div>';
    html+='<table class="help-grid"><thead><tr><th>REPORT NAME</th><th>COVERS</th><th>DAY</th><th>TIME ET</th></tr></thead><tbody>';
    html+='<tr><td>Daily Cattle &amp; Beef</td><td>BT50</td><td>Mon\u2013Fri</td><td>3:00 PM</td></tr>';
    html+='<tr><td>Wkly Boneless Beef Trimmings</td><td>BT65, BT81, BT90</td><td>Friday</td><td>3:00 PM</td></tr>';
    html+='<tr><td>Weekly National Chicken</td><td>CKBR</td><td>Friday</td><td>2:00 PM</td></tr>';
    html+='<tr><td>Misc Poultry Report</td><td>CKLV, CKGZ</td><td>Friday</td><td>2:00 PM</td></tr>';
    html+='<tr><td>National Potato &amp; Onion</td><td>PTRS</td><td>Mon\u2013Fri</td><td>5:00 PM</td></tr>';
    html+='<tr><td>Terminal Vegetable Prices</td><td>GNSB</td><td>Mon\u2013Fri</td><td>12:00 PM</td></tr>';
    html+='</tbody></table>';
    html+='<div class="help-note" style="margin-top:10px"><span class="help-warn">\u26a0 IMPORTANT:</span> All prices shown are actual USDA published report values only \u2014 no synthetic or interpolated data. Historical charts show only available report dates; gaps between dates are not filled. The terminal does not auto-update; prices reflect the most recent manual refresh. Always use the \u2197 View PDF links to verify current USDA market prices before making purchasing decisions.</div>';
    html+='</div>';
    html+='</div>';
    html+='</div>';

    // ── SECTION 6: Keyboard Shortcuts ──
    html+='<div class="help-section">';
    html+='<div class="help-stitle">06 \u2014 KEYBOARD SHORTCUTS</div>';
    html+='<div class="help-kv">';
    var ks=[["↑ / K","Previous commodity"],["↓ / J","Next commodity"],["S","Single view"],["O","Overlay view"],["M","Matrix view"],["F","Toggle forecast"],["L","Toggle $/lb mode"],["?","Open / close guide"],["Esc","Close all panels"]];
    ks.forEach(function(k){html+='<div class="help-key"><span class="hk">'+k[0]+'</span><span class="hv">'+k[1]+'</span></div>';});
    html+='</div>';
    html+='</div>';

    html+='</div></div></div>'; // close help-body, help-box, help-overlay
  }

  // ═══ MARKET INTEL PANEL ═══
  if(s.intel!==null){
    var ic=COMS[s.intel],im=s.metrics[s.intel],ibs=genIntel(s.intel);
    html+='<div class="intel-overlay" onclick="closeIntel()"></div>';
    html+='<div class="intel-panel" style="border-top:3px solid '+ic.cl+'">';
    html+='<div class="intel-hdr"><div style="display:flex;align-items:baseline"><span class="intel-sym" style="color:'+ic.cl+'">'+ic.sy+'</span><span class="intel-nm">MARKET INTEL \u00b7 '+ic.nm.toUpperCase()+(s.lbMode?' \u00b7 NOTE: prices shown in native unit ('+ic.un+')':'')+'</span></div>';
    html+='<button class="intel-close" onclick="closeIntel()">\u00d7 CLOSE</button></div>';
    html+='<div class="intel-body">';
    html+='<div class="intel-label">AUTO-GENERATED SIGNALS FROM USDA PRICE DATA'+(im?' \u00b7 CURRENT: '+fmt(im.latest,2)+' '+ic.un:'')+' \u00b7 PROCUREMENT CONTEXT BELOW</div>';
    ibs.forEach(function(b){
      var icon,col;
      if(b.type==="warn"){icon="\u25b2";col="var(--amb)";}
      else if(b.type==="good"){icon="\u25bc";col="var(--grn)";}
      else if(b.type==="info"){icon="\u25cf";col="var(--blu)";}
      else{icon="\u2192";col="var(--mut)";}
      html+='<div class="intel-bullet"><span class="intel-icon" style="color:'+col+'">'+icon+'</span><span class="intel-text">'+b.text+'</span></div>';
    });
    html+='<div class="intel-meta">\u25b2 Elevated / cost risk \u00b7 \u25bc Declining / favorable \u00b7 \u25cf Market context \u00b7 \u2192 Informational \u00b7 All signals derived from USDA AMS published price data only \u00b7 Not a live feed \u00b7 Verify at USDA AMS before procurement decisions</div>';
    html+='</div></div>';
  }

  document.getElementById("app").innerHTML=html;
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    if(s.view==="MATRIX"){COMS.forEach(function(c,i){var cv=document.getElementById("mini"+i);if(!cv)return;sizeCanvas(cv);var mf=s.lbMode?lbFactor(c):1;var d=lbSer(filterDays(s.data[i]||[],days),mf);var fc=s.fc?lbFc(s.forecasts[i]||null,mf):null;drawMini(cv,d,c.cl,fc);});}
    else if(s.view==="OVERLAY"){var ov=document.getElementById("overlayChart");if(ov){sizeCanvas(ov);var ovSeries=COMS.map(function(c,i){return filterDays(s.data[i]||[],days);});var ovCols=COMS.map(function(c){return c.cl;});var ovLbls=COMS.map(function(c){return c.sy;});drawOverlay(ov,ovSeries,ovCols,ovLbls,{});ov.onmousemove=function(ev){var r=ov.getBoundingClientRect();drawOverlay(ov,ovSeries,ovCols,ovLbls,{hoverX:ev.clientX-r.left});};ov.onmouseleave=function(){drawOverlay(ov,ovSeries,ovCols,ovLbls,{});};}}
    else{var cv=document.getElementById("mainChart");if(cv){sizeCanvas(cv);var sf=s.lbMode?lbFactor(COMS[s.sel]):1;var series=lbSer(filterDays(s.data[s.sel]||[],days),sf);var fcScaled=s.fc?lbFc(s.forecasts[s.sel],sf):null;drawChart(cv,series,COMS[s.sel].cl,{fcData:fcScaled});cv.onmousemove=function(ev){var r=cv.getBoundingClientRect();drawChart(cv,series,COMS[s.sel].cl,{fcData:fcScaled,hoverX:ev.clientX-r.left});};cv.onmouseleave=function(){drawChart(cv,series,COMS[s.sel].cl,{fcData:fcScaled});};}}
  });});
}

// ═══ ACTIONS ═══
window.pick=function(i){state.sel=i;state.view="SINGLE";state.showPanel=false;state.intel=null;render();};
window.setTR=function(r){state.tr=r;render();};
window.setView=function(v){state.view=v;state.showPanel=false;state.intel=null;render();};
window.toggleFc=function(){state.fc=!state.fc;render();};
window.togglePanel=function(){state.showPanel=!state.showPanel;render();};
window.markChecked=function(ev){state.lastCheck=Date.now();};
window.toggleHelp=function(){state.showHelp=!state.showHelp;if(state.showHelp)state.intel=null;render();};
window.toggleLb=function(){state.lbMode=!state.lbMode;render();};
window.openIntel=function(i,ev){ev.stopPropagation();state.intel=(state.intel===i)?null:i;render();};
window.closeIntel=function(){state.intel=null;render();};

document.addEventListener("keydown",function(ev){
  if(document.activeElement&&document.activeElement.tagName==="INPUT")return;
  var i=state.sel;
  if(ev.key==="ArrowDown"||ev.key==="j"){ev.preventDefault();state.sel=(i+1)%COMS.length;state.view="SINGLE";state.showPanel=false;render();}
  if(ev.key==="ArrowUp"||ev.key==="k"){ev.preventDefault();state.sel=(i-1+COMS.length)%COMS.length;state.view="SINGLE";state.showPanel=false;render();}
  if(ev.key==="f"){state.fc=!state.fc;render();}
  if(ev.key==="o"){state.view="OVERLAY";render();}
  if(ev.key==="m"){state.view="MATRIX";render();}
  if(ev.key==="s"){state.view="SINGLE";render();}
  if(ev.key==="l"){state.lbMode=!state.lbMode;render();}
  if(ev.key==="Escape"){state.showPanel=false;state.showHelp=false;state.intel=null;render();}
  if(ev.key==="?"){state.showHelp=!state.showHelp;render();}
});
document.addEventListener("click",function(ev){if(state.showPanel&&!ev.target.closest(".rbtn")&&!ev.target.closest(".rpanel")){state.showPanel=false;render();}});
setInterval(function(){var el=document.getElementById("clock");if(el)el.textContent=new Date().toLocaleTimeString("en-US",{hour12:false})+" CT";},1000);
// Re-check report status every 5 min
setInterval(function(){render();},300000);
window.addEventListener("resize",function(){render();});
render();
</script>
</body>
</html>
