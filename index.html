<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommodIQ Terminal — Maev Finance</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#000000;--panel:#0a0c12;--card:#0d1018;--card2:#12151f;--hover:#1b2233;--bdr:#2b3650;--bdr2:#46597f;--txt:#f5f8ff;--dim:#c4d0e8;--mut:#94a2bf;--grn:#00ffc2;--red:#ff5e7d;--amb:#ffc233;--blu:#5ab0ff;--cyn:#24e9ff;--mag:#d28bff;--news:#05070d}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'IBM Plex Mono','Courier New',monospace;font-size:13px;overflow-x:hidden;-webkit-font-smoothing:antialiased;letter-spacing:.01em}
body{background-image:radial-gradient(ellipse at top,rgba(16,28,58,.5) 0%,var(--bg) 60%)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--panel)}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
a{color:var(--blu);text-decoration:none}
button{font-family:inherit;cursor:pointer;outline:none;border:1px solid var(--bdr);background:transparent;color:var(--dim);border-radius:3px;padding:5px 13px;font-size:12px;font-weight:600;letter-spacing:.5px;transition:all .15s ease}
button:hover{border-color:var(--bdr2);color:var(--txt);background:rgba(26,37,64,.35)}
button.on{background:rgba(0,230,180,.14);color:var(--grn);border-color:rgba(0,230,180,.5);box-shadow:0 0 0 1px rgba(0,230,180,.08)}
.shell{display:flex;flex-direction:column;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:13px 24px;border-bottom:1px solid var(--bdr);background:linear-gradient(180deg,var(--panel) 0%,#0b1220 100%);box-shadow:0 1px 0 rgba(255,255,255,.02) inset}
.logo{font-size:20px;font-weight:800;letter-spacing:4.5px;color:var(--grn)}.logo b{color:var(--amb)}
.hdr-firm{font-size:9.5px;color:var(--mut);letter-spacing:2.2px;font-weight:600}
.hdr-r{display:flex;gap:14px;align-items:center;font-size:11.5px;color:var(--dim)}
.live{color:var(--grn);font-size:11px}.clock{color:var(--txt);font-variant-numeric:tabular-nums;font-size:12.5px;font-weight:500}
/* Refresh button states */
.rbtn{border-radius:3px;padding:5px 14px;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .2s;position:relative;letter-spacing:.3px}
.rbtn.avail{background:rgba(0,230,180,.15);color:#00e6b4;border:1px solid rgba(0,230,180,.5);animation:pulse 2s ease infinite}
.rbtn.stale{background:transparent;color:var(--mut);border:1px solid var(--bdr);cursor:default}
.rbtn .badge{position:absolute;top:-5px;right:-5px;background:#ff4d6a;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;line-height:1.3}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,230,180,.3)}50%{box-shadow:0 0 8px 2px rgba(0,230,180,.15)}}
/* Report panel */
.rpanel{position:absolute;top:100%;right:0;margin-top:8px;background:linear-gradient(180deg,var(--card2) 0%,var(--card) 100%);border:1px solid var(--bdr2);border-radius:4px;padding:14px 18px;width:420px;z-index:100;box-shadow:0 18px 48px rgba(0,0,0,.75),0 1px 0 rgba(255,255,255,.03) inset}
.rpanel-title{font-size:10px;color:var(--dim);letter-spacing:1.5px;margin-bottom:10px;font-weight:700}
.ritem{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(38,51,79,.45);font-size:11px}
.ritem:last-child{border-bottom:none}
.ritem .rlabel{color:var(--txt)}.ritem .rstatus{font-weight:600;font-size:10px;letter-spacing:.3px}
.ritem a{color:var(--blu);font-size:10px;margin-left:8px}
.rnew{color:var(--grn)}.rold{color:var(--mut)}
.rnext{font-size:10px;color:var(--mut);margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)}
/* Ticker */
.ticker{background:var(--news);border-bottom:1px solid var(--bdr);overflow:hidden;height:37px;position:relative;box-shadow:inset 0 1px 0 rgba(255,255,255,.03),inset 0 -1px 0 rgba(0,0,0,.4)}
.ticker-track{display:flex;position:absolute;top:0;height:30px;align-items:center;white-space:nowrap;animation:scroll 410s linear infinite;will-change:transform;transform:translateZ(0);backface-visibility:hidden}
.ticker:hover .ticker-track{animation-play-state:paused}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker a{display:inline-flex;align-items:center;gap:10px;padding:0 24px;height:37px;font-size:12.5px;border-right:1px solid rgba(38,51,79,.45);text-decoration:none;transition:background .15s}
.ticker a:hover{background:rgba(26,37,64,.4)}
.ticker .td{color:var(--amb);font-weight:700;font-size:10.5px;letter-spacing:.5px}.ticker .ts{color:var(--mut);font-size:10.5px;letter-spacing:.3px}.ticker .tt{color:var(--txt);font-weight:500}.ticker .tl{color:var(--blu);font-size:11px}
/* News list toggle + expanded panel */
.ticker-actions{position:absolute;right:0;top:0;height:37px;display:flex;z-index:5;box-shadow:-12px 0 12px -6px rgba(4,8,16,.9)}
.news-toggle{height:37px;padding:0 16px;background:var(--news);border:none;border-left:1px solid var(--bdr);border-radius:0;color:var(--dim);font-size:10.5px;font-weight:700;letter-spacing:1.2px;white-space:nowrap}
.news-toggle:hover{color:var(--txt);background:var(--hover);border-color:var(--bdr2)}
.news-toggle.on{color:var(--amb);border-left-color:rgba(255,176,32,.5)}
.pdf-toggle{color:var(--cyn)}
.pdf-toggle:hover{color:#8af0ff;background:var(--hover);border-color:var(--bdr2)}
.pdf-toggle.busy{color:var(--amb);cursor:wait;opacity:.85}
.news-panel{background:linear-gradient(180deg,var(--news) 0%,var(--panel) 100%);border-bottom:1px solid var(--bdr2);max-height:330px;overflow-y:auto;padding:6px 24px 12px;box-shadow:inset 0 8px 16px -10px rgba(0,0,0,.6),0 10px 24px -8px rgba(0,0,0,.5)}
.news-panel-title{font-size:9px;color:var(--mut);letter-spacing:2.2px;font-weight:700;padding:8px 0 8px;border-bottom:1px solid var(--bdr);margin-bottom:2px}
.news-row{display:flex;align-items:baseline;gap:14px;padding:7.5px 4px;border-bottom:1px solid rgba(38,51,79,.35);font-size:12.5px;text-decoration:none;transition:background .12s}
.news-row:last-child{border-bottom:none}
.news-row:hover{background:rgba(26,37,64,.5)}
.news-row .nd{color:var(--amb);font-weight:700;font-size:10.5px;min-width:52px;letter-spacing:.5px;flex-shrink:0}
.news-row .ns{color:var(--mut);font-size:10.5px;min-width:100px;letter-spacing:.3px;flex-shrink:0}
.news-row .nt{color:var(--txt);flex:1;line-height:1.5}
.news-row .tl{flex-shrink:0}
/* KPI */
.kpi-strip{display:flex;flex-wrap:wrap;gap:8px;padding:14px 24px 8px}
.kpi{background:linear-gradient(180deg,var(--card2) 0%,var(--card) 100%);border:1px solid var(--bdr);border-radius:4px;padding:11px 14px 24px;cursor:pointer;min-width:152px;position:relative;overflow:hidden;transition:all .18s ease;flex:0 0 auto;box-shadow:0 1px 0 rgba(255,255,255,.025) inset}
.kpi:hover{border-color:var(--bdr2);background:linear-gradient(180deg,var(--hover) 0%,var(--card2) 100%);transform:translateY(-1px)}
.kpi.sel{background:linear-gradient(180deg,var(--hover) 0%,var(--card2) 100%);border-color:var(--bdr2)}.kpi .bar{position:absolute;top:0;left:0;right:0;height:3px}
.kpi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.kpi-sym{font-size:12.5px;font-weight:700;letter-spacing:1.6px}.kpi-unit{font-size:9.5px;color:var(--mut);font-weight:500}
.kpi-price{font-size:27px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.3px;line-height:1.15;margin-bottom:2px}
.kpi-chg{display:flex;gap:8px;margin-top:5px;font-size:11.5px;font-weight:600}.kpi-sep{color:var(--mut)}
.kpi-trend{font-size:16px;margin-left:auto;opacity:.9}
/* Layout */
.controls{display:flex;justify-content:space-between;align-items:center;padding:8px 24px 9px;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--bdr);background:rgba(13,21,36,.35)}
.ctrl-l{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn-grp{display:flex;gap:3px}
.keys-hint{font-size:9.5px;color:var(--mut);letter-spacing:.5px}
.main{display:flex;gap:12px;padding:12px 24px 12px}
.chart-col{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0}
.chart-title{padding:2px 4px;font-size:14px;font-weight:600;letter-spacing:.4px}
.chart-box{background:linear-gradient(180deg,var(--card2) 0%,var(--card) 100%);border:1px solid var(--bdr);border-radius:4px;position:relative;overflow:hidden;flex:1;min-height:368px;box-shadow:0 1px 0 rgba(255,255,255,.02) inset,0 4px 16px rgba(0,0,0,.25)}
.chart-box canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
.mini-chart{overflow:hidden;position:relative;height:148px}.mini-chart canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
.side{width:220px;display:flex;flex-direction:column;gap:10px;align-self:flex-start}
.detail{background:linear-gradient(180deg,var(--card2) 0%,var(--card) 100%);border:1px solid var(--bdr);border-radius:4px;padding:14px 16px;font-size:12.5px;line-height:1.85;box-shadow:0 1px 0 rgba(255,255,255,.02) inset}
.det-sym{font-size:13.5px;font-weight:700;margin-bottom:5px;letter-spacing:1.6px}
.det-src{font-size:9px;color:var(--mut);margin-bottom:10px;letter-spacing:.6px;font-weight:500}
.det-srclink{cursor:pointer;color:var(--blu);transition:color .12s}.det-srclink:hover{color:var(--cyn);text-decoration:underline}
.asof-cell:hover{color:var(--cyn)!important}
.det-row{display:flex;justify-content:space-between;padding:2px 0}.det-lbl{color:var(--dim);font-weight:500}.det-val{font-variant-numeric:tabular-nums;font-weight:600;color:var(--txt)}
.tbl-wrap{padding:0 24px 16px}
.tbl-box{background:linear-gradient(180deg,var(--card2) 0%,var(--card) 100%);border:1px solid var(--bdr);border-radius:4px;padding:14px 16px;overflow-x:auto;box-shadow:0 1px 0 rgba(255,255,255,.02) inset}
.tbl-title{font-size:11.5px;color:var(--dim);margin-bottom:10px;letter-spacing:2.2px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{padding:7px 9px;text-align:right;color:var(--dim);font-weight:600;font-size:10.5px;border-bottom:1px solid var(--bdr2);letter-spacing:.7px;text-transform:uppercase}
th:first-child{text-align:left}
td{padding:7px 9px;text-align:right;font-variant-numeric:tabular-nums;border-bottom:1px solid rgba(38,51,79,.35);font-size:12.5px}
td:first-child{text-align:left;font-weight:700;letter-spacing:.3px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(26,37,64,.55)}
.footer{display:flex;justify-content:space-between;align-items:center;padding:8px 24px;border-top:1px solid var(--bdr);background:var(--panel);font-size:9.5px;color:var(--mut);letter-spacing:.3px}
.matrix{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mini-hdr{font-size:11px;font-weight:700;letter-spacing:1.6px;padding:7px 11px;background:var(--card);display:flex;justify-content:space-between;align-items:center;border-top:3px solid}
.up{color:var(--grn)}.dn{color:var(--red)}.flat{color:var(--dim)}
/* Overlay commodity selector */
.ovbar{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;position:relative}
.ovsel-wrap{position:relative;flex-shrink:0}
.ovsel-btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--bdr2);background:linear-gradient(180deg,var(--card2),var(--card));color:var(--txt);border-radius:4px;padding:6px 13px;font-size:11px;font-weight:600;letter-spacing:.5px}
.ovsel-btn:hover{border-color:var(--blu);background:var(--hover);color:var(--txt)}
.ovsel-btn.open{border-color:var(--blu);color:var(--blu);border-bottom-left-radius:0;border-bottom-right-radius:0;background:var(--hover)}
.ovsel-btn .cnt{color:var(--blu);font-weight:700}
.ovsel-btn .car{font-size:8px;transition:transform .18s ease;opacity:.8}
.ovsel-btn.open .car{transform:rotate(180deg)}
.ovsel-menu{position:absolute;top:100%;right:0;margin-top:-1px;width:300px;background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--blu);border-radius:4px 0 4px 4px;z-index:60;box-shadow:0 20px 48px rgba(0,0,0,.72),0 1px 0 rgba(255,255,255,.03) inset;padding:8px;transform-origin:top right;animation:ovMenuIn .17s cubic-bezier(.2,.85,.25,1)}
@keyframes ovMenuIn{from{opacity:0;transform:translateY(-7px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
.ovsel-head{display:flex;justify-content:space-between;align-items:center;padding:1px 4px 8px;border-bottom:1px solid var(--bdr);margin-bottom:5px}
.ovsel-head .oh-t{font-size:8.5px;letter-spacing:1.6px;color:var(--mut);font-weight:700}
.ovsel-quick{display:flex;gap:5px}
.ovsel-quick button{padding:3px 10px;font-size:9px;letter-spacing:.5px}
.ovsel-row{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:3px;cursor:pointer;transition:background .12s,opacity .12s;border:1px solid transparent}
.ovsel-row:hover{background:var(--hover)}
.ovsel-row.off{opacity:.45}
.ovsel-row.on{background:rgba(90,176,255,.09);border-color:rgba(90,176,255,.28)}
.ovsel-sw{width:11px;height:11px;border-radius:3px;flex-shrink:0;box-shadow:0 0 0 1px rgba(255,255,255,.14) inset}
.ovsel-sym{font-weight:700;font-size:11px;letter-spacing:.6px;min-width:48px}
.ovsel-nm{color:var(--mut);font-size:10px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ovsel-chk{width:15px;height:15px;border-radius:3px;border:1px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#04121f;flex-shrink:0;transition:all .12s}
.ovsel-row.on .ovsel-chk{background:var(--blu);border-color:var(--blu)}
/* Overlay side legend (clickable) */
.ov-leg{display:flex;align-items:center;gap:9px;padding:5px 7px;border-radius:3px;cursor:pointer;transition:background .12s,opacity .12s;font-size:11.5px}
.ov-leg:hover{background:var(--hover)}
.ov-leg.off{opacity:.4}
.ov-leg .lsw{width:9px;height:9px;border-radius:2px;flex-shrink:0;box-shadow:0 0 0 1px rgba(255,255,255,.12) inset}
.ov-leg .lsym{font-weight:700;flex:1;letter-spacing:.3px}
.ov-leg.off .lsw{box-shadow:none;background:var(--mut)!important}
/* Help overlay */
.help-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(4,8,16,.95);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.help-box{background:var(--panel);border:1px solid var(--bdr2);border-radius:4px;width:100%;max-width:960px;max-height:calc(100vh - 40px);display:flex;flex-direction:column}
.help-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.help-title{font-size:13px;font-weight:800;letter-spacing:2px;color:var(--grn)}
.help-sub{font-size:9px;color:var(--mut);letter-spacing:1.5px;margin-left:14px}
.help-close{font-size:11px;font-weight:700;color:var(--dim);cursor:pointer;background:transparent;border:1px solid var(--bdr);border-radius:3px;padding:4px 13px;font-family:inherit;transition:all .1s}
.help-close:hover{color:var(--txt);border-color:var(--bdr2);background:var(--hover)}
.help-body{padding:24px 26px;overflow-y:auto;flex:1}
.help-section{margin-bottom:30px}
.help-section:last-child{margin-bottom:8px}
.help-stitle{font-size:9px;font-weight:700;letter-spacing:3px;color:var(--amb);margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid var(--bdr)}
.help-grid{width:100%;border-collapse:collapse;margin-bottom:8px}
.help-grid th{padding:5px 10px;text-align:left;color:var(--dim);font-size:9px;font-weight:600;letter-spacing:.5px;border-bottom:1px solid var(--bdr)}
.help-grid td{padding:6px 10px;font-size:11px;border-bottom:1px solid rgba(38,51,79,.25);vertical-align:top;line-height:1.6}
.help-grid tr:last-child td{border-bottom:none}
.help-note{font-size:10.5px;color:var(--dim);line-height:1.85;margin-top:10px}
.help-sub-label{font-size:9px;color:var(--mut);letter-spacing:1.2px;margin:16px 0 8px;font-weight:600}
.help-cols{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.help-kv{display:flex;gap:9px;flex-wrap:wrap}
.help-key{background:var(--card);border:1px solid var(--bdr);border-radius:3px;padding:6px 14px;display:flex;gap:14px;align-items:center;min-width:180px}
.help-key .hk{color:var(--grn);font-weight:700;font-size:11px;min-width:44px}
.help-key .hv{color:var(--dim);font-size:10px}
.help-warn{color:#ff4d6a;font-size:10px;font-weight:600}
.help-hbtn{font-size:12px;font-weight:700;padding:3px 10px;cursor:pointer;transition:all .1s}
/* Market Intel Panel */
.intel-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:498;background:rgba(4,8,16,.55);cursor:default}
.intel-panel{position:fixed;left:50%;transform:translateX(-50%);top:175px;width:570px;max-width:calc(100vw - 24px);max-height:calc(100vh - 195px);background:var(--card);border:1px solid var(--bdr2);border-radius:4px;box-shadow:0 18px 52px rgba(0,0,0,.75);display:flex;flex-direction:column;overflow:hidden;z-index:499}
.intel-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.intel-sym{font-size:13px;font-weight:800;letter-spacing:2px}
.intel-nm{font-size:8.5px;color:var(--mut);letter-spacing:1.5px;margin-left:10px;font-weight:500}
.intel-close{font-size:10px;font-weight:700;color:var(--dim);cursor:pointer;background:transparent;border:1px solid var(--bdr);border-radius:3px;padding:3px 11px;font-family:inherit;transition:all .1s;letter-spacing:.3px}
.intel-close:hover{color:var(--txt);border-color:var(--bdr2)}
.intel-body{padding:13px 16px 14px;overflow-y:auto}
.intel-label{font-size:9px;color:var(--mut);letter-spacing:1.5px;font-weight:600;margin-bottom:10px}
.intel-bullet{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(38,51,79,.32);font-size:11px;line-height:1.6}
.intel-bullet:last-child{border-bottom:none}
.intel-icon{font-size:11px;font-weight:700;min-width:16px;margin-top:2px}
.intel-text{color:var(--txt);flex:1}
.intel-meta{font-size:9px;color:var(--mut);letter-spacing:.7px;margin-top:10px;padding-top:8px;border-top:1px solid var(--bdr);line-height:1.6}
.kpi-info{position:absolute;bottom:5px;right:7px;font-size:8.5px;color:var(--mut);background:transparent;border:1px solid var(--bdr);border-radius:2px;padding:1px 6px;cursor:pointer;transition:all .12s;font-family:inherit;font-weight:600;letter-spacing:.4px;line-height:1.5}
.kpi-info:hover{color:var(--txt);border-color:var(--bdr2);background:rgba(38,51,79,.35)}
.kpi-info.iac{color:var(--amb);border-color:rgba(255,176,32,.5);background:rgba(255,176,32,.1)}
.kpi-asof{position:absolute;bottom:6px;left:14px;font-size:8.5px;color:var(--mut);letter-spacing:.3px;font-weight:600;font-variant-numeric:tabular-nums;cursor:pointer;transition:color .12s}
.kpi-asof:hover{color:var(--cyn)}
/* Mobile: keep the news-bar action buttons compact + on-screen on narrow phones */
@media (max-width:560px){.news-toggle{padding:0 9px;font-size:9px;letter-spacing:.4px}.ticker-actions{box-shadow:-8px 0 10px -6px rgba(4,8,16,.92)}}
</style>
</head>
<body>
<div class="shell" id="app"></div>

// Date convention for sorting: "Mon DD" = day-specific (BASE_YEAR); "Mon YYYY" = month-only (sorts to start of month).
// Stable: items on the same date keep their authored order. Bump BASE_YEAR when the dataset rolls into a new year.
(function(){
  var BASE_YEAR=2026,MON={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  function newsTime(d){
    var p=String(d||"").trim().split(/\s+/),mo=MON[p[0]];
    if(mo==null)return 0;
    var n=parseInt(p[1],10);
    if(p[1]&&p[1].length===4&&!isNaN(n))return new Date(n,mo,1).getTime();   // "Jun 2026" (month-only)
    return new Date(BASE_YEAR,mo,isNaN(n)?1:n).getTime();                    // "Jun 12" (day-specific)
  }
  NEWS=NEWS.map(function(n,i){return{n:n,i:i,t:newsTime(n.d)};})
           .sort(function(a,b){return b.t-a.t||a.i-b.i;})
           .map(function(x){return x.n;});
})();

function getReportStatus(){
  var now=new Date();
  var etOffset=(now.getUTCMonth()>=3&&now.getUTCMonth()<=10)?-4:-5;// EDT Apr-Oct, EST Nov-Mar
  var utcH=now.getUTCHours();
  var etH=utcH+etOffset;var dow=now.getUTCDay();// 0=Sun
  if(etH<0){etH+=24;dow=(dow+6)%7;}
  var lastCheck=state.lastCheck||0;
  var results=[];var newCount=0;
  var seen={};// dedupe reports
  COMS.forEach(function(c){
    var rk=c.rpt;if(seen[rk])return;seen[rk]=true;
    var rpt=REPORTS[rk];if(!rpt)return;
    var isReportDay=rpt.days.indexOf(dow)>=0;
    var pastTime=etH>=rpt.hour;
    var available=isReportDay&&pastTime;
    var isNew=available&&(now.getTime()-lastCheck>3600000);// new if >1hr since last check
    if(isNew)newCount++;
    results.push({key:rk,name:rpt.name,freq:rpt.freq,url:rpt.url,available:available,isNew:isNew});
  });
  // Find next report time
  var nextStr="";
  var dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var earliest=null;
  Object.keys(REPORTS).forEach(function(rk){
    var rpt=REPORTS[rk];
    for(var d=0;d<7;d++){
      var checkDay=(dow+d)%7;
      if(rpt.days.indexOf(checkDay)>=0){
        var h=rpt.hour;
        if(d===0&&etH>=h)continue;// already past today
        if(!earliest||d<earliest.d||(d===earliest.d&&h<earliest.h))earliest={d:d,h:h,day:dayNames[checkDay]};
        break;
      }
    }
  });
  if(earliest)nextStr=earliest.day+" "+earliest.h+":00 ET";
  return{reports:results,newCount:newCount,next:nextStr};
}

function countConsecutive(data){

  var n=data.length,dir=data[n-1].price>data[n-2].price?1:-1,count=1;
  for(var i=n-2;i>0;i--){if(dir>0&&data[i].price>data[i-1].price)count++;else if(dir<0&&data[i].price<data[i-1].price)count++;else break;}
  return{count:count,dir:dir};
}

function drawMini(cv,series,color,fcData){

  var pr=series.map(function(d){return d.price;});

  var hasData=seriesArr&&seriesArr.some(function(ser){return ser&&ser.length>=1;});
  if(!hasData){
    var none=!seriesArr||!seriesArr.length;
    ctx.fillStyle="#7886a3";ctx.font="600 11px 'IBM Plex Mono',monospace";ctx.textAlign="center";
    ctx.fillText(none?"SELECT COMMODITIES TO OVERLAY":"NO REPORTS IN THIS TIME RANGE",w/2,h/2-6);
    ctx.fillStyle="#5b6880";ctx.font="9.5px 'IBM Plex Mono',monospace";

  var ticks=6;

  ctx.save();ctx.beginPath();ctx.rect(0,0,Math.max(0,prog)*w,h);ctx.clip();

function pdSafe(s){if(s==null)return"";

var PD_MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var PD_MONI={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function pdNewsTime(d){var p=String(d||"").trim().split(/\s+/),mo=PD_MONI[p[0]];if(mo==null)return 0;var n=parseInt(p[1],10);if(p[1]&&p[1].length===4&&!isNaN(n))return Date.UTC(n,mo,1);return Date.UTC(2026,mo,isNaN(n)?1:n);}

function pdISO(dt){return dt.getUTCFullYear()+"-"+pdZ(dt.getUTCMonth()+1)+"-"+pdZ(dt.getUTCDate());}
function pdLong(dt){return PD_MON[dt.getUTCMonth()]+" "+dt.getUTCDate()+", "+dt.getUTCFullYear();}

function pdMonday(dt){var d=new Date(dt.getTime()),day=d.getUTCDay(),diff=(day===0?6:day-1);d.setUTCDate(d.getUTCDate()-diff);return d;}

function pdPct(v){return(v==null||isNaN(v))?"—":(v>=0?"+":"")+v.toFixed(1)+"%";}

  R.paragraph=function(text,o){o=o||{};var d=this.doc,size=o.size||9.3,lh=o.lh||size*1.4;d.setFont("helvetica",o.bold?"bold":"normal");d.setFontSize(size);pdTC(d,o.color||PINK.soft);var lines=d.splitTextToSize(pdSafe(text),o.w||PG.CW);for(var i=0;i<lines.length;i++){this.checkPage(lh);d.text(lines[i],o.x!=null?o.x:PG.M,this.y);this.y+=lh;}this.y+=(o.after!=null?o.after:4);};

// ── Derive the executive-summary bullets purely from live metrics/forecasts/NEWS (never fabricate) ──
function pdBuildSummary(){
  var b=[];
  var mv=null;for(var i=0;i<COMS.length;i++){var m=state.metrics[i];if(m&&m.wow!=null){if(!mv||Math.abs(m.wow)>Math.abs(mv.m.wow))mv={i:i,m:m,c:COMS[i]};}}
  if(mv){var dd=state.data[mv.i],asof=dd&&dd.length?fdate(dd[dd.length-1].date):"";b.push("Biggest weekly move: "+mv.c.nm+" "+(mv.m.wow>=0?"+":"")+mv.m.wow.toFixed(1)+"% W/W to "+mv.m.latest.toFixed(2)+" "+mv.c.un+" (as of "+asof+").");}
  var i50=-1,i90=-1;for(var i=0;i<COMS.length;i++){if(COMS[i].k==="BT50")i50=i;if(COMS[i].k==="BT90")i90=i;}
  if(i50>=0&&i90>=0&&state.metrics[i50]&&state.metrics[i90]){var prem=state.metrics[i90].latest-state.metrics[i50].latest;b.push("Lean premium (BT90 minus BT50) at $"+prem.toFixed(2)+"/cwt -- "+(prem>=250?"historically extreme":"elevated")+", confirming tight lean-trim supply versus adequate fat trim.");}
  var fs=[];for(var i=0;i<COMS.length;i++){var f=state.forecasts[i],m=state.metrics[i];if(f&&f.length&&m)fs.push({i:i,f:f,m:m});}
  if(fs.length){var up=0,dn=0,fl=0;for(var k=0;k<fs.length;k++){var end=fs[k].f[fs[k].f.length-1].price,lat=fs[k].m.latest;if(end>=lat*1.03)up++;else if(end<=lat*0.97)dn++;else fl++;}b.push("Forward outlook: "+up+" of "+fs.length+" forecasted markets skew higher (>+3%), "+dn+" lower, "+fl+" broadly flat.");}
  if(fs.length){var best=fs[0];for(var k=1;k<fs.length;k++)if(fs[k].f.mase<best.f.mase)best=fs[k];var end=best.f[best.f.length-1].price,lat=best.m.latest,d=((end-lat)/lat*100);b.push("Highest model skill: "+COMS[best.i].nm+" (MASE "+best.f.mase+(best.f.beatsNaive?", beats seasonal-naive":"")+") projects "+(d>=0?"+":"")+d.toFixed(1)+"% over "+best.f.horizonLabel.toLowerCase()+".");}
  var imp=null;for(var i=0;i<NEWS.length;i++){var n=NEWS[i],isPrice=(n.s==="USDA AMS")&&/\d+CL|\$\d|¢|\/cwt|\/lb/.test(n.t);if(!isPrice){imp=n;break;}}
  if(!imp&&NEWS.length)imp=NEWS[0];// guarantee a Watch line so the summary never silently shrinks
  if(imp){var t=imp.t.split(" — ")[0];if(t.length>96)t=t.slice(0,95)+"...";b.push("Top story: "+t+" ("+imp.s+", "+imp.d+").");}
  return b;
}
// ── This week's headlines: 10-day window (never-empty floor of 6), theme-grouped from the vetted NEWS array ──
function pdRenderHeadlines(R){
  var d=R.doc,newsMax=NEWS.length?pdNewsTime(NEWS[0].d):0,cutoff=newsMax-10*86400000;
  var sel=NEWS.filter(function(n){return pdNewsTime(n.d)>=cutoff;});
  if(sel.length<6)sel=NEWS.slice(0,6);
  var extra=0;if(sel.length>10){extra=sel.length-10;sel=sel.slice(0,10);}
  var groups=[{key:"RED MEAT — BEEF / LAMB",col:PINK.red,items:[]},{key:"POULTRY",col:PINK.green,items:[]},{key:"PRODUCE",col:PINK.blue,items:[]},{key:"MACRO / WEATHER",col:PINK.amber,items:[]}];
  function theme(n){var t=n.t.toLowerCase(),s=n.s;
    if(/lamb|sheep|mutton|sheepmeat/.test(t))return 0;// lamb is red meat — check before chicken's liver/gizzard so lamb offal isn't filed under poultry
    if(/chicken|breast|broiler|hpai|h5n1|avian|poultry|liver|gizzard/.test(t))return 1;
    if(/potato|russet|norkotah|green bean|snap bean|vegetable|spud|acreage|idaho|irrigation/.test(t))return 2;
    if(/screwworm|cattle|herd|beef|trim|\dcl|drought|imported|imports|australia|new zealand|brazil|uruguay|variety meat/.test(t)||s==="Drovers"||s==="DTN/Drovers"||s==="Dallas Fed"||s==="CNN Business"||s==="USDA NASS")return 0;
    if(/el ni|noaa|wasde|ers|forecast|corn|soybean|feed|price outlook/.test(t)||s==="NOAA CPC"||s==="USDA WASDE"||s==="USDA ERS"||s==="USDA ERS/APHIS")return 3;
    return 0;}
  for(var i=0;i<sel.length;i++)groups[theme(sel[i])].items.push(sel[i]);
  for(var g=0;g<groups.length;g++){var grp=groups[g];if(!grp.items.length)continue;
    R.checkPage(26);d.setFont("helvetica","bold");d.setFontSize(8.5);pdTC(d,grp.col);d.text(pdSafe(grp.key),PG.M,R.y);R.y+=12;
    for(var j=0;j<grp.items.length;j++){var n=grp.items[j];
      R.checkPage(13);d.setFont("helvetica","bold");d.setFontSize(8);pdTC(d,PINK.green);d.text(pdSafe(n.d),PG.M,R.y);
      d.setFont("helvetica","normal");d.setFontSize(8.2);pdTC(d,PINK.ink);
      var lines=d.splitTextToSize(pdSafe(n.t+"  ("+n.s+")"),PG.CW-44);
      for(var li=0;li<lines.length;li++){if(li>0)R.checkPage(11);d.text(lines[li],PG.M+44,R.y);R.y+=10.5;}
      R.y+=3;
    }
    R.gap(3);
  }
  if(extra>0)R.paragraph("+"+extra+" more headlines this period -- open the ALL NEWS panel in the live terminal.",{size:7.6,color:PINK.mut,after:6});
}
// ── Forecast & outlook: per-commodity projection lines + sourced anchor context + honest no-model note ──
function pdRenderOutlook(R){
  var fs=[];for(var i=0;i<COMS.length;i++){var f=state.forecasts[i],m=state.metrics[i];if(f&&f.length&&m)fs.push({i:i,f:f,m:m,c:COMS[i]});}
  for(var k=0;k<fs.length;k++){var o=fs[k],end=o.f[o.f.length-1].price,lat=o.m.latest,dd=((end-lat)/lat*100);
    var dir=dd>=1?"higher":(dd<=-1?"lower":"broadly flat");
    var conf=o.f.beatsNaive?(o.f.mase<0.5?"high-confidence":(o.f.mase<=0.8?"moderate-confidence":"directional (marginally beats seasonal-naive)")):"low-confidence (does not beat the seasonal-naive benchmark)";
    R.paragraph(o.c.sy+" -- "+o.c.nm+": "+o.f.method+" model projects "+dir+" to ~"+end.toFixed(2)+" "+o.c.un+" over "+o.f.horizonLabel.toLowerCase()+" ("+(dd>=0?"+":"")+dd.toFixed(1)+"%), "+conf+"; MASE "+o.f.mase+".",{size:8.6,color:PINK.soft,after:6});
  }
  R.gap(2);
  var anchors=["BT90","CB","PT"];for(var c=0;c<anchors.length;c++){var idx=-1;for(var i=0;i<COMS.length;i++)if(COMS[i].k===anchors[c])idx=i;if(idx<0)continue;var arr=INTEL_CONTEXT[anchors[c]];if(arr&&arr.length)R.bullet(arr[arr.length-1],PINK.blue);}
  R.paragraph("BT81 (thin negotiated trade) is modeled on a weekly lattice with no-trade weeks carried forward (model input only); it beats the seasonal-naive benchmark. Snap Green Beans is shown LOW-CONFIDENCE: 16 prints over 6 years, off-market until the ~Nov new crop -- a trend extrapolation across the off-season void, not expected quotes. See the terminal's INTEL panels for qualitative context.",{size:7.6,color:PINK.mut,after:4});
}

    rows+="<tr><td class='k'>"+esc(c.sy)+"</td><td>"+esc(c.nm)+"</td><td class='num'>"+nm(m.latest)+" <span class='un'>"+esc(c.un)+"</span></td><td class='num "+cls(m.wow)+"'>"+pc(m.wow)+"</td><td class='num "+cls(m.mom)+"'>"+pc(m.mom)+"</td><td class='num "+cls(m.yoy)+"'>"+pc(m.yoy)+"</td><td class='num'>"+((f&&f.length)?nm(f[f.length-1].price):"—")+"</td></tr>";}
  var news="";for(var i=0;i<Math.min(NEWS.length,12);i++){var n=NEWS[i];news+="<li><span class='d'>"+esc(n.d)+"</span> "+esc(n.t)+" <span class='s'>- "+esc(n.s)+"</span></li>";}
  var mon=pdMonday(pdAnchor());
  w.document.write("<!doctype html><html><head><meta charset='utf-8'><title>CommodIQ_Weekly_"+pdISO(pdAnchor())+"</title><style>@page{size:A4;margin:15mm}*{box-sizing:border-box}body{font:11px/1.45 'Helvetica Neue',Arial,sans-serif;color:#0d121e;margin:0}.band{background:#0d121e;color:#fff;padding:14px 18px;border-bottom:3px solid #008a64}.band h1{font-size:19px;margin:0 0 3px;color:#fff}.band .sub{color:#9fb0c8;font-size:10px}.wrap{padding:16px 18px}h2{font-size:12px;margin:18px 0 6px;padding-bottom:3px;border-bottom:2px solid #2b3650}table{width:100%;border-collapse:collapse;margin:6px 0 14px}th,td{padding:5px 8px;border-bottom:1px solid #d2d9e4;text-align:left}th{background:#f7f9fc;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#4a566e}td.num,th.num{text-align:right}td.k{font-weight:700}.un{color:#7c89a1;font-size:9px}.up{color:#c5264a}.dn{color:#008a64}tr:nth-child(even) td{background:#f9fafc}ul{margin:0;padding-left:0;list-style:none}li{padding:4px 0;border-bottom:1px solid #edf1f7;font-size:10px}li .d{display:inline-block;min-width:52px;color:#008a64;font-weight:700}li .s{color:#7c89a1;font-style:italic}.ft{margin-top:16px;color:#7c89a1;font-size:8.5px;border-top:1px solid #d2d9e4;padding-top:6px}@media print{.noprint{display:none}}</style></head><body><div class='band'><h1>CommodIQ Weekly Procurement Brief</h1><div class='sub'>MAEV FINANCE &nbsp;&middot;&nbsp; Week of "+esc(pdLong(mon))+" &nbsp;&middot;&nbsp; All values published USDA/industry - verifiable at source</div></div><div class='wrap'><h2>Commodity Snapshot</h2><table><thead><tr><th>Sym</th><th>Commodity</th><th class='num'>Last</th><th class='num'>W%</th><th class='num'>M%</th><th class='num'>Y%</th><th class='num'>Fcst</th></tr></thead><tbody>"+rows+"</tbody></table><h2>Latest Headlines</h2><ul>"+news+"</ul><p class='ft'>Generated client-side from published USDA/industry data. No synthetic or interpolated values. Forecasts are damped-trend ETS projections, not guarantees. Source documents are linked in the live terminal. &copy; MAEV FINANCE.</p></div><button class='noprint' onclick='window.print()' style='position:fixed;top:10px;right:10px;padding:8px 14px'>Save as PDF</button></body></html>");
  w.document.close();w.focus();setTimeout(function(){try{w.print();}catch(e){}},350);
}
window.downloadBriefing=function(ev){if(ev&&ev.stopPropagation)ev.stopPropagation();if(state.briefingBusy)return;state.briefingBusy=true;render();
  var done=function(){state.briefingBusy=false;render();};// reset busy state in BOTH paths (no Promise.finally — works on pre-ES2018 engines)
  loadJsPDF().then(
    function(jsPDF){try{buildBriefing(jsPDF);}catch(e){console.warn("[CommodIQ] briefing build failed, using print fallback:",e);try{openPrintFallback();}catch(_){}}done();},
    function(err){console.warn("[CommodIQ] jsPDF unavailable, using print fallback:",err);try{openPrintFallback();}catch(_){}done();}
  );
};

// ═══ ACTIONS ═══
window.pick=function(i){state.sel=i;state.view="SINGLE";state.showPanel=false;state.intel=null;state.ovMenu=false;render();};
window.setTR=function(r){state.tr=r;render();};
window.setView=function(v){state.view=v;state.showPanel=false;state.intel=null;if(v!=="OVERLAY")state.ovMenu=false;render();};
window.toggleFc=function(){state.fc=!state.fc;render();};
window.togglePanel=function(){state.showPanel=!state.showPanel;render();};
window.markChecked=function(ev){state.lastCheck=Date.now();};
window.toggleHelp=function(){state.showHelp=!state.showHelp;if(state.showHelp)state.intel=null;render();};
window.toggleLb=function(){state.lbMode=!state.lbMode;render();};
// Origin toggle — the cascade: switch active origin, rebuild every origin-bearing series (prices + metrics +
// forecast), then re-render so prices, the source citation, news and the briefing all follow one toggle.
window.setOrigin=function(o){if(state.origin===o)return;state.origin=o;COMS.forEach(function(c,i){if(c.origins)buildOne(i);});render();};
window.toggleNews=function(){state.newsOpen=!state.newsOpen;render();};
window.openSrc=function(i){var c=COMS[i];if(!c)return;var u=c.origins?c.origins[activeOrigin(c)].src:c.src;if(u)window.open(u,"_blank","noopener");};
window.openIntel=function(i,ev){ev.stopPropagation();state.intel=(state.intel===i)?null:i;render();};
window.closeIntel=function(){state.intel=null;render();};
// ── Overlay commodity selector ──
window.toggleOvMenu=function(ev){if(ev)ev.stopPropagation();state.ovMenu=!state.ovMenu;render();};
window.toggleOv=function(i){var a=(state.ovSel||[]).slice(),k=a.indexOf(i);if(k>=0)a.splice(k,1);else a.push(i);state.ovSel=a;render();};
window.ovAll=function(){state.ovSel=COMS.map(function(c,i){return i;});render();};
window.ovNone=function(){state.ovSel=[];render();};

document.addEventListener("keydown",function(ev){
  if(document.activeElement&&document.activeElement.tagName==="INPUT")return;
  var i=state.sel;
  if(ev.key==="ArrowDown"||ev.key==="j"){ev.preventDefault();state.sel=(i+1)%COMS.length;state.view="SINGLE";state.showPanel=false;render();}
  if(ev.key==="ArrowUp"||ev.key==="k"){ev.preventDefault();state.sel=(i-1+COMS.length)%COMS.length;state.view="SINGLE";state.showPanel=false;render();}
  if(ev.key==="f"){state.fc=!state.fc;render();}
  if(ev.key==="o"){state.view="OVERLAY";render();}
  if(ev.key==="m"){state.view="MATRIX";render();}
  if(ev.key==="s"){state.view="SINGLE";render();}
  if(ev.key==="l"){state.lbMode=!state.lbMode;render();}
  if(ev.key==="g"){var c=COMS[state.sel];if(state.view==="SINGLE"&&c.origins){var ks=Object.keys(c.origins),i=(ks.indexOf(activeOrigin(c))+1)%ks.length;setOrigin(ks[i]);}}
  if(ev.key==="n"){state.newsOpen=!state.newsOpen;render();}
  if(ev.key==="b"){downloadBriefing();}
  if(ev.key==="Escape"){state.showPanel=false;state.showHelp=false;state.intel=null;state.newsOpen=false;state.ovMenu=false;render();}
  if(ev.key==="?"){state.showHelp=!state.showHelp;render();}
});
document.addEventListener("click",function(ev){if(state.showPanel&&!ev.target.closest(".rbtn")&&!ev.target.closest(".rpanel")){state.showPanel=false;render();}});
document.addEventListener("click",function(ev){if(state.ovMenu&&!ev.target.closest(".ovsel-wrap")){state.ovMenu=false;render();}});
setInterval(function(){var el=document.getElementById("clock");if(el)el.textContent=new Date().toLocaleTimeString("en-US",{hour12:false})+" CT";},1000);
// Re-check report status every 5 min
setInterval(function(){render();},300000);
window.addEventListener("resize",function(){render();});
render();
</script>
</body>
